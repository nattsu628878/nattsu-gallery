<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/site-static/nattsu_320_320_tt.ico" type="image/x-icon" sizes="any">
  <link rel="apple-touch-icon" href="/site-static/nattsu_320_320_tt.png">
  <title>opus-editer - nattsu</title>
  <link rel="stylesheet" href="opus-editer.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="title">opus-editer</span>
    </header>

    <main class="main opus-editer-layout">
      <section class="data-section">
        <div class="data-section-header">
          <button type="button" id="addRowBtn" class="btn btn-primary">＋</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="col-order"></th>
                <th class="col-id">ID</th>
                <th class="col-title">タイトル</th>
                <th class="col-type">種別</th>
                <th class="col-date">日付</th>
                <th class="col-tags">タグ</th>
                <th class="col-actions">×</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody"></tbody>
          </table>
        </div>
      </section>

      <aside class="detail-section" id="detailSection">
        <div class="detail-panel" id="detailPanel">
          <h2 class="detail-panel-title" id="detailPanelTitle"></h2>

          <form id="detailForm" class="detail-form" style="display: none;">
            <input type="hidden" id="detailRowIndex" value="">
            <div class="detail-common">
              <div class="field">
                <label for="id">ID *</label>
                <input type="text" id="id" required autocomplete="off">
                <span class="hint" id="idHint"></span>
              </div>
              <div class="field">
                <label for="title">タイトル</label>
                <input type="text" id="title">
              </div>
              <div class="field">
                <label for="date">日付</label>
                <input type="date" id="date">
              </div>
              <div class="field">
                <label for="tagsInput">タグ</label>
                <div id="tagsContainer" class="tags-container"></div>
                <input type="text" id="tagsInput" class="tags-input" autocomplete="off">
              </div>
            </div>

            <div class="detail-type-tabs">
              <button type="button" class="mode-btn active" data-mode="picture">画像</button>
              <button type="button" class="mode-btn" data-mode="movie">動画</button>
            </div>

            <div id="panel-picture" class="panel detail-panel-content">
              <div class="field">
                <label for="pictureFile">画像</label>
                <div class="image-drop" id="pictureDrop">
                  <input type="file" id="pictureFile" accept="image/*" hidden>
                </div>
              </div>
              <div class="field picture-preview-field">
                <div id="picturePreviewPane" class="preview-pane preview-pane--image">
                  <img id="picturePreview" class="picture-preview-img" alt="" style="display: none;">
                </div>
              </div>
            </div>

            <div id="panel-movie" class="panel detail-panel-content" style="display: none;">
              <div class="field">
                <label for="movieUrl">URL</label>
                <input type="url" id="movieUrl">
              </div>
              <div class="field">
                <label for="movieFile">ファイル</label>
                <input type="file" id="movieFile" accept="video/*">
              </div>
              <div class="field">
                <div id="moviePreview" class="preview-pane preview-pane--video movie-preview"></div>
              </div>
            </div>

            <div class="detail-actions">
              <button type="button" id="detailSaveBtn" class="btn primary">保存</button>
              <button type="button" id="detailDeleteBtn" class="btn btn-danger">削除</button>
              <button type="button" id="draftSaveBtn" class="btn btn-secondary">仮保存</button>
              <span id="status" class="status"></span>
            </div>
          </form>
        </div>
      </aside>
    </main>
  </div>
  <script src="opus-editer.js"></script>
</body>
</html>
