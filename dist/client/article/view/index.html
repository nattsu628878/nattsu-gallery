amp;#39;t need to change any other names.\n        }\n    }\n}\n\nfn greet_people(time: Res&amp;lt;Time&amp;gt;, mut timer: ResMut&amp;lt;GreetTimer&amp;gt;, query: Query&amp;lt;&amp;amp;Name, With&amp;lt;Person&amp;gt;&amp;gt;) {\n    // update our timer with the time elapsed since the last update\n    // if that caused the timer to finish, we say hello to everyone\n    if timer.0.tick(time.delta()).just_finished() {\n        for name in &amp;amp;query {\n            println!(&amp;quot;hello {}!&amp;quot;, name.0);\n        }\n    }\n}\n\npub struct HelloPlugin;\n\nimpl Plugin for HelloPlugin {\n    fn build(&amp;amp;self, app: &amp;amp;mut App) {\n        app.insert_resource(GreetTimer(Timer::from_seconds(2.0, TimerMode::Repeating)));\n        app.add_systems(Startup, add_people);\n        app.add_systems(Update, (update_people, greet_people).chain());\n    }\n}\n\nfn main() {\n    App::new()\n        .add_plugins(DefaultPlugins)\n        .add_plugins(HelloPlugin)\n        .run();\n}\n&lt;/code&gt;&lt;/pre&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Bevy&quot;],&quot;title&quot;:[0,&quot;Bevy&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Bevy&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;bevyengine&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Bevy(Rust)_env?path=Bevy(Rust)_env\&quot;&gt;Bevy(Rust)_env&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Compressor&quot;],&quot;title&quot;:[0,&quot;Compressor&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Compressor&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;img src=\&quot;/nattsu-gallery/_astro/%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%B7%E3%83%A7%E3%83%83%E3%83%88%202026-02-10%201.26.50.BwSu-IH-.webp\&quot; alt=\&quot;スクリーンショット 2026-02-10 1.26.50.webp\&quot;&gt;&lt;br&gt;&lt;a href=\&quot;https://support.apple.com/ja-jp/guide/logicpro/lgcead9636ef/12.0/mac/15.6\&quot;&gt;https://support.apple.com/ja-jp/guide/logicpro/lgcead9636ef/12.0/mac/15.6&lt;/a&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt 楽曲全体の平均音圧のこと&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;ラウドネスノーマライゼーション&lt;br&gt; LUFS/LKFSという単位を基準に、ある一定値以上の音圧の高い音源は自動で音量を下げるシステム&lt;br&gt;ほとんどの配信サービスは-14.0LUFS&lt;br&gt;（SoundCloudは-8.0LUFS）&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;ただし圧縮感もジャンルによっては必要&lt;/p&gt;\n&lt;p&gt;参考&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;EDM : -6～-8LUFS&lt;/li&gt;\n&lt;li&gt;HipHop : -8～-11LUFS&lt;/li&gt;\n&lt;li&gt;Trap Beat : -12～-14LUFS&lt;/li&gt;\n&lt;li&gt;Rock : -7～-9LUFS&lt;/li&gt;\n&lt;li&gt;Metal Core : -4～-6LUFS&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;リファレンス音源を測定するのが良い。&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;LogicProの思想&quot;],&quot;title&quot;:[0,&quot;LogicProの思想&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/LogicProの思想&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Compressor?path=Compressor\&quot;&gt;Compressor&lt;/a&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;マスタリング系&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Mastering%20Assistant?path=Mastering%20Assistant\&quot;&gt;Mastering Assistant&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Mastering Assistant&quot;],&quot;title&quot;:[0,&quot;Mastering Assistant&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Mastering Assistant&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;img src=\&quot;/nattsu-gallery/_astro/%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%B7%E3%83%A7%E3%83%83%E3%83%88%202026-01-06%209.40.56.9569NyTa.webp\&quot; alt=\&quot;スクリーンショット 2026-01-06 9.40.56.webp\&quot;&gt;&lt;/p&gt;\n&lt;h1&gt;Dynamics&lt;/h1&gt;\n&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/LUFS?path=LUFS\&quot;&gt;LUFS&lt;/a&gt;&lt;br&gt;Loudness Units Full Scale&lt;br&gt;人間の耳は大きい音ほど良い音と認識するという前提&lt;br&gt;昔は&lt;a href=\&quot;/nattsu-gallery/article/_home/RMS?path=RMS\&quot;&gt;RMS&lt;/a&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Integrated LUFS&lt;br&gt;楽曲全体の平均音圧のこと&lt;/li&gt;\n&lt;li&gt;ラウドネスノーマライゼーション&lt;br&gt; LUFS/LKFSという単位を基準に、ある一定値以上の音圧の高い音源は自動で音量を下げるシステム&lt;br&gt;ほとんどの配信サービスは-14.0LUFS&lt;br&gt;（SoundCloudは-8.0LUFS）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;ただし圧縮感もジャンルによっては必要&lt;/p&gt;\n&lt;p&gt;参考&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;EDM : -6～-8LUFS&lt;/li&gt;\n&lt;li&gt;HipHop : -8～-11LUFS&lt;/li&gt;\n&lt;li&gt;Trap Beat : -12～-14LUFS&lt;/li&gt;\n&lt;li&gt;Rock : -7～-9LUFS&lt;/li&gt;\n&lt;li&gt;Metal Core : -4～-6LUFS&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Spread&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;Correlation（相関）&lt;br&gt;左右チャンネルの相関を表している&lt;/li&gt;\n&lt;/ul&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;PCの威力を初心者に教える&quot;],&quot;title&quot;:[0,&quot;PCの威力を初心者に教える&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/PCの威力を初心者に教える&quot;],&quot;html&quot;:[0,&quot;&lt;h1&gt;PCガイド for iPhone ユーザー&lt;/h1&gt;\n&lt;h2&gt;はじめに：なぜPCなのか&lt;/h2&gt;\n&lt;h3&gt;PCとは何か&lt;/h3&gt;\n&lt;p&gt;PCは&lt;strong&gt;Personal Computer&lt;/strong&gt;の略で、あなた個人専用の情報処理装置です。iPhoneも広義のコンピュータですが、PCはより自由度が高く、創造的な作業に特化しています。&lt;/p&gt;\n&lt;h3&gt;iPhoneとPCの違い&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;項目&lt;/th&gt;\n&lt;th&gt;iPhone&lt;/th&gt;\n&lt;th&gt;PC (Mac)&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;主な用途&lt;/td&gt;\n&lt;td&gt;情報消費・コミュニケーション&lt;/td&gt;\n&lt;td&gt;情報創造・生産活動&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;画面&lt;/td&gt;\n&lt;td&gt;小さい（片手サイズ）&lt;/td&gt;\n&lt;td&gt;大きい（複数ウィンドウ表示可能）&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;入力&lt;/td&gt;\n&lt;td&gt;タッチ・フリック&lt;/td&gt;\n&lt;td&gt;キーボード・マウス（精密操作）&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ファイル管理&lt;/td&gt;\n&lt;td&gt;アプリ内に隠蔽&lt;/td&gt;\n&lt;td&gt;自由に管理可能&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;カスタマイズ性&lt;/td&gt;\n&lt;td&gt;制限あり&lt;/td&gt;\n&lt;td&gt;高い自由度&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;できること&lt;/td&gt;\n&lt;td&gt;アプリ依存&lt;/td&gt;\n&lt;td&gt;プログラミング・開発・制作&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;h1&gt;思想・持論：&lt;/h1&gt;\n&lt;p&gt;楽の追求は文明の発展の追求そのものである。&lt;br&gt;いかに楽に生活できるようにするかが人類の進化の歴史そのもの。&lt;/p&gt;\n&lt;p&gt;過去には産業革命・コンピュータの登場・インターネットの登場でブレイクスルーが起きてきた。&lt;br&gt;現代においてはコンピュータとインターネットを活用するのは当たり前とし、AIという新たな大きなブレイクスルーが起きようとしている今、AIの活用も必須。&lt;/p&gt;\n&lt;p&gt;人類の進化の歴史を止めないために、人類全員が楽に生活できるようにするために、&lt;/p&gt;\n&lt;p&gt;=エンジニアの思考&lt;/p&gt;\n&lt;h3&gt;PCは人間の拡張である&lt;/h3&gt;\n&lt;p&gt;PCを使うことで、あなたは：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;より速く考えられる&lt;/strong&gt;（メモ・検索・AI）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;より遠くに届けられる&lt;/strong&gt;（インターネット・SNS）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;より多くを記憶できる&lt;/strong&gt;（ファイル・データベース）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;より複雑なものを作れる&lt;/strong&gt;（プログラム・音楽・動画）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;PCは、あなたの思考と創造性を加速するパートナーです。&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;今後、脳とコンピュータが直接繋がる時代が来るかもしれませんが、今はまだキーボードとマウスが最良のインターフェイスです。この「人間とPCの接続」をスムーズにすることで、あなたの可能性は無限に広がります。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;さあ、創造の旅を始めましょう。&lt;/strong&gt;&lt;/p&gt;\n&lt;h3&gt;なぜPCが必要なのか&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;PCは人間の思考を拡張するツールです。&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;頭の中のアイデアを形にできる&lt;/li&gt;\n&lt;li&gt;AIと対話して思考を深められる&lt;/li&gt;\n&lt;li&gt;情報を整理・保存・検索できる&lt;/li&gt;\n&lt;li&gt;世界中の人と繋がり、作品を共有できる&lt;/li&gt;\n&lt;li&gt;学び、創り、表現する自由がある&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;iPhoneは「消費」が中心ですが、PCは　&lt;strong&gt;「創造」のためのツール&lt;/strong&gt;です。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;コンテンツを自分で創り、自分で消費するのが究極体。&lt;/strong&gt;&lt;/p&gt;\n&lt;h3&gt;PCでできること（情報のインプット＆アウトプット）&lt;/h3&gt;\n&lt;h3&gt;インプット（情報取得）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;ブラウザによる情報収集&lt;/strong&gt;：複数タブで効率的にリサーチ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;YouTube・SNS&lt;/strong&gt;：大画面で快適な視聴&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ゲーム・映画&lt;/strong&gt;：コンテンツ消費&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;読書・論文&lt;/strong&gt;：PDFやKindleを大画面で読む&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;オンライン学習&lt;/strong&gt;：Udemyなど学習コンテンツ&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;アウトプット（創造活動）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;文章作成&lt;/strong&gt;：ブログ、レポート、小説、メモ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;プログラミング&lt;/strong&gt;：アプリ開発、ウェブサイト制作&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;音楽制作&lt;/strong&gt;：DAWで作曲・編曲・ミキシング&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;動画編集&lt;/strong&gt;：YouTube動画、Vlog制作&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;画像・イラスト制作&lt;/strong&gt;：デザイン、お絵描き&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;研究活動&lt;/strong&gt;：データ分析、シミュレーション&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ゲーム開発&lt;/strong&gt;：UnityやUnreal Engineでゲーム制作&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;1. Mac を選ぶ・購入する&lt;/h2&gt;\n&lt;h3&gt;1.1 Mac の種類&lt;/h3&gt;\n&lt;h3&gt;MacBook（ノート型）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;MacBook Air&lt;/strong&gt;：軽量・長時間バッテリー・静音（初心者におすすめ）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;MacBook Pro&lt;/strong&gt;：高性能・プロ向け（動画編集・音楽制作・開発）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;iMac（デスクトップ型）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;大画面一体型&lt;/li&gt;\n&lt;li&gt;持ち運ばない人向け&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Mac mini / Mac Studio&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;モニター別売り&lt;/li&gt;\n&lt;li&gt;上級者向け&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;1.2 スペックの選び方&lt;/h3&gt;\n&lt;h3&gt;チップ（頭脳）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;M3/M4チップ&lt;/strong&gt;：最新・高性能（おすすめ）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メモリ（RAM）&lt;/strong&gt;：16GB以上（複数アプリを同時に使う）&lt;ul&gt;\n&lt;li&gt;= 動作の快適さ度合い&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ストレージ（SSD）&lt;/strong&gt;：512GB以上（写真・動画・音楽を保存）&lt;ul&gt;\n&lt;li&gt;アプリ自体のデータを保存するため（↑のようなデータはクラウドに）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;1.3 購入場所&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Apple Store&lt;/strong&gt;（公式、学割あり）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;家電量販店&lt;/strong&gt;（ポイント還元）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Amazon&lt;/strong&gt;（セール時お得）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;1.4 一緒に買うべきもの&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;USB-Cハブ&lt;/strong&gt;（USB-A、HDMI、SDカードなど拡張）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;外付けSSD&lt;/strong&gt;（バックアップ用、1TB程度）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;マウス&lt;/strong&gt;（Magic Mouse or ロジクール MX Master）&lt;ul&gt;\n&lt;li&gt;トラックパッドが優秀なのでいらないかも&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;外部モニター&lt;/strong&gt;（作業効率アップ、23〜27インチ）&lt;ul&gt;\n&lt;li&gt;いずれ買えばよし&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;Brain Machine Interface（BMI）の重要性&lt;/h4&gt;\n&lt;hr&gt;\n&lt;h2&gt;2. 初期設定&lt;/h2&gt;\n&lt;h3&gt;2.1 開封〜起動&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;箱を開けて本体を取り出す&lt;/li&gt;\n&lt;li&gt;電源ボタンを長押し（Touch ID部分）&lt;/li&gt;\n&lt;li&gt;画面の指示に従う&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;2.2 Apple ID でサインイン&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;iPhoneで使っているApple IDを入力&lt;/li&gt;\n&lt;li&gt;自動的にiCloudと同期される&lt;/li&gt;\n&lt;li&gt;写真・連絡先・メモがMacでも使える&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;2.3 Touch ID（指紋認証）の設定&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;ロック解除、支払い認証に使用&lt;/li&gt;\n&lt;li&gt;iPhoneのTouch IDと同じ&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;2.4 Trackpad（トラックパッド）の設定&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;システム設定 &amp;gt; トラックパッド&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;タップでクリック：オン（推奨）&lt;/li&gt;\n&lt;li&gt;スクロール方向：ナチュラル（iPhoneと同じ）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;2.5 Dock（ドック）の設定&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;画面下のアプリバー（iPhoneのホーム画面に相当）&lt;/li&gt;\n&lt;li&gt;よく使うアプリを並べる&lt;/li&gt;\n&lt;li&gt;不要なアプリは削除（ドラッグ&amp;amp;ドロップで外す）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;なっつはこんな感じ&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;attachment:ebf2812d-0ccd-4ed8-8a96-aa2ab1f5603f:%E3%82%A2%E3%83%95%E3%82%9A%E3%83%AA%E3%82%92%E6%99%92%E3%81%99.png\&quot; alt=\&quot;アプリを晒す.png\&quot;&gt;&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;3. 基本操作（iPhoneとの対応）&lt;/h2&gt;\n&lt;h3&gt;3.1 マルチタッチジェスチャー&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;操作&lt;/th&gt;\n&lt;th&gt;iPhone&lt;/th&gt;\n&lt;th&gt;Mac（トラックパッド）&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;タップ&lt;/td&gt;\n&lt;td&gt;タップ&lt;/td&gt;\n&lt;td&gt;1本指でタップ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;スクロール&lt;/td&gt;\n&lt;td&gt;上下スワイプ&lt;/td&gt;\n&lt;td&gt;2本指で上下スワイプ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;戻る&lt;/td&gt;\n&lt;td&gt;左スワイプ&lt;/td&gt;\n&lt;td&gt;2本指で左スワイプ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ホームに戻る&lt;/td&gt;\n&lt;td&gt;下からスワイプ&lt;/td&gt;\n&lt;td&gt;親指と3本指でピンチ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;アプリ切り替え&lt;/td&gt;\n&lt;td&gt;上スワイプ長押し&lt;/td&gt;\n&lt;td&gt;3本指で左右スワイプ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;拡大・縮小&lt;/td&gt;\n&lt;td&gt;ピンチイン/アウト&lt;/td&gt;\n&lt;td&gt;2本指でピンチイン/アウト&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3&gt;3.2 Finder（ファイル管理）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;iPhoneの「ファイル」アプリの強化版&lt;/li&gt;\n&lt;li&gt;全てのファイルを自由に管理できる&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Command + N&lt;/strong&gt;：新規ウィンドウ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Command + T&lt;/strong&gt;：新規タブ&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3.3 メニューバー&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;画面最上部の操作メニュー&lt;/li&gt;\n&lt;li&gt;右上：Wi-Fi、バッテリー、日時、Spotlight（検索）など&lt;/li&gt;\n&lt;li&gt;左上：アプリ名、ファイル、編集、表示など&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3.4 Spotlight 検索&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Command + Space&lt;/strong&gt;で起動&lt;/li&gt;\n&lt;li&gt;アプリ、ファイル、設定、計算、単位変換など何でも検索&lt;/li&gt;\n&lt;li&gt;iPhoneの検索機能の強化版&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3.5 Mission Control（マルチタスク）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;3本指で上スワイプ&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;開いている全ウィンドウを一覧表示&lt;/li&gt;\n&lt;li&gt;デスクトップ（作業スペース）を複数作成可能&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;4. ファイルシステムの理解&lt;/h2&gt;\n&lt;h3&gt;4.1 フォルダ構造（家の部屋に例える）&lt;/h3&gt;\n&lt;pre&gt;&lt;code&gt;Macintosh HD（家全体）\n├── アプリケーション（共有の倉庫）\n├── システム（家の基礎・触らない）\n└── ユーザ（あなたの部屋）\n    └── あなたの名前\n        ├── デスクトップ（机の上）\n        ├── 書類（引き出し）\n        ├── ダウンロード（郵便受け）\n        ├── ピクチャ（写真アルバム）\n        ├── ミュージック（音楽棚）\n        ├── ムービー（動画棚）\n        └── パブリック（玄関・共有スペース）\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3&gt;4.2 ファイルの整理方法&lt;/h3&gt;\n&lt;h3&gt;基本ルール&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;デスクトップは常に綺麗に&lt;/strong&gt;（作業中のものだけ）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;書類フォルダで整理&lt;/strong&gt;（プロジェクトごとにフォルダ分け）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ダウンロードは定期的に整理&lt;/strong&gt;（1週間以内に移動or削除）&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;おすすめフォルダ構成&lt;/h3&gt;\n&lt;pre&gt;&lt;code&gt;書類/\n├── 01_プロジェクト/\n│   ├── アプリ開発/\n│   ├── 音楽制作/\n│   └── 動画編集/\n├── 02_学習/\n│   ├── プログラミング/\n│   ├── 音楽理論/\n│   └── 研究/\n├── 03_メモ/\n├── 04_資料/\n└── 05_アーカイブ/\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;クラウドストレージも同じように管理するといいかも&lt;br&gt;なっつはこんな感じ&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;attachment:4c021e9e-6ad7-45d5-89c0-6398a75a05aa:%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%B7%E3%83%A7%E3%83%83%E3%83%88_2025-10-17_2.56.56.png\&quot; alt=\&quot;スクリーンショット 2025-10-17 2.56.56.png\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;クラウドストレージは、家族なら共用のを1つ持てば十分かも。&lt;/p&gt;\n&lt;p&gt;iCloudかなぁ、&lt;/p&gt;\n&lt;p&gt;なっつは学校で契約してるOneDrive3テラバイト&lt;/p&gt;\n&lt;h3&gt;4.3 ファイルの拡張子（データの種類）&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;拡張子&lt;/th&gt;\n&lt;th&gt;種類&lt;/th&gt;\n&lt;th&gt;開くアプリ&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;.txt&lt;/td&gt;\n&lt;td&gt;テキスト&lt;/td&gt;\n&lt;td&gt;メモ、Cursor&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.md&lt;/td&gt;\n&lt;td&gt;Markdown&lt;/td&gt;\n&lt;td&gt;Cursor&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.pdf&lt;/td&gt;\n&lt;td&gt;PDF文書&lt;/td&gt;\n&lt;td&gt;プレビュー、Cursor&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.jpg, .png&lt;/td&gt;\n&lt;td&gt;画像&lt;/td&gt;\n&lt;td&gt;プレビュー、GIMP、Inkscape&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.mp3, .wav&lt;/td&gt;\n&lt;td&gt;音声&lt;/td&gt;\n&lt;td&gt;ミュージック、Garage Band&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.mp4, .mov&lt;/td&gt;\n&lt;td&gt;動画&lt;/td&gt;\n&lt;td&gt;QuickTime、DaVinci Resolve&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;.zip&lt;/td&gt;\n&lt;td&gt;圧縮ファイル&lt;/td&gt;\n&lt;td&gt;ダブルクリックで解凍&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;hr&gt;\n&lt;h2&gt;5. アプリケーションの基本&lt;/h2&gt;\n&lt;p&gt;ブラウザを中心に、そのほかの特化したアプリを同時に開いて、情報を捌いていく。&lt;br&gt;ここ10年くらいで、基本的にはブラウザでなんでもできるようになってきた。&lt;br&gt;そのほかのアプリはその補助。&lt;/p&gt;\n&lt;h3&gt;5.1 アプリのインストール方法&lt;/h3&gt;\n&lt;h3&gt;App Store（推奨・安全）&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;Dockから「App Store」を開く&lt;/li&gt;\n&lt;li&gt;検索して「入手」ボタン&lt;/li&gt;\n&lt;li&gt;Apple IDでサインイン&lt;/li&gt;\n&lt;li&gt;自動でインストール&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;公式サイトからダウンロード&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;ブラウザで公式サイトにアクセス&lt;/li&gt;\n&lt;li&gt;.dmgファイルをダウンロード&lt;/li&gt;\n&lt;li&gt;ダブルクリックで開く&lt;/li&gt;\n&lt;li&gt;アプリをアプリケーションフォルダにドラッグ&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;5.2 必須アプリ&lt;/h3&gt;\n&lt;h3&gt;標準アプリ（最初から入っている）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Safari&lt;/strong&gt;：ブラウザ（Chrome、Firefoxも使える）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メール&lt;/strong&gt;：メール管理&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メモ&lt;/strong&gt;：簡単なメモ（iPhoneと同期）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;カレンダー&lt;/strong&gt;：スケジュール管理&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メッセージ&lt;/strong&gt;：iMessage（iPhoneと同期）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;プレビュー&lt;/strong&gt;：PDF・画像閲覧&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;写真&lt;/strong&gt;：写真管理（iPhoneと同期）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ミュージック&lt;/strong&gt;：音楽再生&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;追加で入れるべきアプリ&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;生産性&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Google Chrome&lt;/strong&gt;：高機能ブラウザ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Notion&lt;/strong&gt;：オールインワンノート&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;情報発信&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Discord&lt;/strong&gt;：情報共有&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;OBS Studio&lt;/strong&gt;：配信&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;開発&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Cursor&lt;/strong&gt;：AIテキストエディタ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Visual Studio Code&lt;/strong&gt;：コードエディタ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub Desktop&lt;/strong&gt;：バージョン管理&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Docker&lt;/strong&gt;：開発環境&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;クリエイティブ&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;GarageBand&lt;/strong&gt;：音楽制作（無料・初心者向け）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;iMovie&lt;/strong&gt;：動画編集（無料）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DaVinci Resolve&lt;/strong&gt;：動画編集（無料）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Inkscape&lt;/strong&gt;：無料のベクター画像編集ソフト（イラスト・ロゴ制作向け）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GIMP&lt;/strong&gt;：無料の画像レタッチ・加工ソフト&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;ユーティリティ&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;BuhoCleaner&lt;/strong&gt;：システムクリーナー&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;6. キーボードショートカット（最重要）&lt;/h2&gt;\n&lt;h3&gt;6.1 基本中の基本&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;ショートカット&lt;/th&gt;\n&lt;th&gt;機能&lt;/th&gt;\n&lt;th&gt;iPhone相当&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + C&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;コピー&lt;/td&gt;\n&lt;td&gt;長押し→コピー&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + V&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;ペースト&lt;/td&gt;\n&lt;td&gt;長押し→ペースト&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + X&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;切り取り&lt;/td&gt;\n&lt;td&gt;-&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Z&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;元に戻す&lt;/td&gt;\n&lt;td&gt;シェイクで取り消し&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + A&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;全選択&lt;/td&gt;\n&lt;td&gt;-&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + S&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;保存&lt;/td&gt;\n&lt;td&gt;自動保存&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Q&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;アプリ終了&lt;/td&gt;\n&lt;td&gt;上スワイプで閉じる&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + W&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;ウィンドウを閉じる&lt;/td&gt;\n&lt;td&gt;-&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Tab&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;アプリ切り替え&lt;/td&gt;\n&lt;td&gt;アプリスイッチャー&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Space&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Spotlight検索&lt;/td&gt;\n&lt;td&gt;ホーム画面で下スワイプ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3&gt;6.2 Finder操作&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;ショートカット&lt;/th&gt;\n&lt;th&gt;機能&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + N&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;新規ウィンドウ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + T&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;新規タブ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Delete&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;ゴミ箱に移動&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Shift + Delete&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;ゴミ箱を空にする&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + F&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;検索&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + I&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;情報を見る&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Space&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;クイックルック（プレビュー）&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3&gt;6.3 スクリーンショット&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;ショートカット&lt;/th&gt;\n&lt;th&gt;機能&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Shift + 3&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;全画面&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Shift + 4&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;範囲選択&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Command + Shift + 5&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;録画・オプション&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;hr&gt;\n&lt;h2&gt;7. 情報のインプット＆アウトプット実践&lt;/h2&gt;\n&lt;h3&gt;7.1 ブラウザによる情報収集&lt;/h3&gt;\n&lt;h3&gt;効率的なブラウジング&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;タブ管理&lt;/strong&gt;：Command + T（新規タブ）、Command + W（閉じる）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ブックマーク&lt;/strong&gt;：Command + D（お気に入り追加）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;履歴&lt;/strong&gt;：Command + Y&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;検索&lt;/strong&gt;：Command + F（ページ内検索）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;複数ウィンドウ&lt;/strong&gt;：異なるテーマで調べる時に便利&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;情報整理ツール&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Notion&lt;/strong&gt;：ウェブクリップ→データベース化&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メモ&lt;/strong&gt;：ふとしたメモをiPhoneでして、後でmacで確認。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;7.2 テキストエディタによる文書作成&lt;/h3&gt;\n&lt;h3&gt;Cursor（AIエディタ）の使い方&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;プロジェクト作成&lt;/strong&gt;：フォルダを開く&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Markdownで執筆&lt;/strong&gt;：.mdファイル作成&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;AIと壁打ち&lt;/strong&gt;：Command + K でAIアシスト&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;コード補完&lt;/strong&gt;：Tab で受け入れ&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;文章作成のワークフロー&lt;/h3&gt;\n&lt;pre&gt;&lt;code&gt;思考 → メモ（メモアプリ）\n     → 下書き（Cursor）\n     → 清書（Notion/ブログ）\n     → 公開（WordPress/note/Zenn）\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3&gt;7.3 音楽制作（DAW）&lt;/h3&gt;\n&lt;h3&gt;GarageBand（無料）で始める&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;新規プロジェクト作成&lt;/li&gt;\n&lt;li&gt;ソフトウェア音源追加&lt;/li&gt;\n&lt;li&gt;MIDIキーボードで演奏（USB接続）&lt;/li&gt;\n&lt;li&gt;オーディオ録音（マイク・楽器）&lt;/li&gt;\n&lt;li&gt;ミキシング・エフェクト&lt;/li&gt;\n&lt;li&gt;書き出し（MP3/WAV）&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;Logic Pro（プロ向け）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;より高度な編集機能&lt;/li&gt;\n&lt;li&gt;プロ品質のプラグイン&lt;/li&gt;\n&lt;li&gt;Flex Time/Pitch（タイミング・音程修正）&lt;/li&gt;\n&lt;li&gt;詳細は別ドキュメント参照&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;7.4 動画編集&lt;/h3&gt;\n&lt;h3&gt;iMovie（無料）&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;プロジェクト作成&lt;/li&gt;\n&lt;li&gt;素材をタイムラインにドラッグ&lt;/li&gt;\n&lt;li&gt;カット・トリミング&lt;/li&gt;\n&lt;li&gt;トランジション追加&lt;/li&gt;\n&lt;li&gt;テキスト・音楽追加&lt;/li&gt;\n&lt;li&gt;書き出し&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;Final Cut Pro（プロ向け）&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;マルチカム編集&lt;/li&gt;\n&lt;li&gt;カラーグレーディング&lt;/li&gt;\n&lt;li&gt;モーショングラフィックス&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;7.5 プログラミング・アプリ開発&lt;/h3&gt;\n&lt;h3&gt;学習の流れ&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;基礎学習&lt;/strong&gt;（Progate、ドットインストール）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;開発環境構築&lt;/strong&gt;（Cursor、VSCode）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;小さなプロジェクト&lt;/strong&gt;（計算機、ToDoリスト）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;フレームワーク&lt;/strong&gt;（React、Flutter、Tauri）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;公開&lt;/strong&gt;（GitHub、App Store）&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;おすすめ言語&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Python&lt;/strong&gt;：AI・データ分析・自動化&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;JavaScript&lt;/strong&gt;：Web開発・フロントエンド&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Swift&lt;/strong&gt;：iOSアプリ開発&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Rust&lt;/strong&gt;：高速・安全なシステム開発&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;7.6 画像・イラスト制作&lt;/h3&gt;\n&lt;h3&gt;無料ツール&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;GIMP&lt;/strong&gt;：Photoshop代替&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Inkscape&lt;/strong&gt;：Illustrator代替&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Krita&lt;/strong&gt;：お絵描き&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;有料ツール&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Affinity Designer&lt;/strong&gt;：買い切り、プロ品質&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Procreate&lt;/strong&gt;（iPad）：イラスト最強&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Photoshop&lt;/strong&gt;：サブスク、業界標準&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;8. ターミナル（黒い画面）の基礎&lt;/h2&gt;\n&lt;h3&gt;8.1 ターミナルとは&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;コンピュータに文字で命令を出すツール&lt;/li&gt;\n&lt;li&gt;GUI（グラフィカル）では できない操作が可能&lt;/li&gt;\n&lt;li&gt;開発者・研究者の必須スキル&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;8.2 ターミナルを開く&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Applications &amp;gt; ユーティリティ &amp;gt; ターミナル&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;または &lt;strong&gt;Command + Space → “ターミナル”と入力&lt;/strong&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;8.3 基本コマンド&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 現在のディレクトリを表示pwd# ファイル一覧を表示lsls -la  # 詳細表示# ディレクトリ移動cd Documents  # Documentsフォルダへcd ..         # 一つ上のフォルダへcd ~          # ホームディレクトリへ# フォルダ作成mkdir my_project\n# ファイル作成touch test.txt\n# ファイル削除rm test.txt\n# フォルダ削除rm -r my_project\n# ファイル内容表示cat test.txt\n# コマンド履歴history\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3&gt;8.4 パッケージマネージャー（Homebrew）&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Homebrewインストール（公式サイトのコマンドをコピペ）\n/bin/bash -c &amp;quot;$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)&amp;quot;\n\n# アプリのインストール\nbrew install node\nbrew install python\n\n# アプリ検索brew search &amp;lt;アプリ名&amp;gt;\n# インストール済み一覧brew list\n&lt;/code&gt;&lt;/pre&gt;\n&lt;hr&gt;\n&lt;h2&gt;9. トラブルシューティング&lt;/h2&gt;\n&lt;h3&gt;9.1 動作が遅い&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;再起動&lt;/strong&gt;：Command + Control + 電源ボタン&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;メモリ確認&lt;/strong&gt;：アクティビティモニタで確認&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ストレージ確認&lt;/strong&gt;：Apple メニュー &amp;gt; このMacについて &amp;gt; ストレージ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;不要なアプリ削除&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;BuhoCleanerでクリーニング&lt;/strong&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;9.2 アプリが動かない&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;強制終了&lt;/strong&gt;：Command + Option + Esc&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;再インストール&lt;/strong&gt;：アプリ削除→再インストール&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;macOS更新&lt;/strong&gt;：最新版にアップデート&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;9.3 Wi-Fiに繋がらない&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Wi-Fiオフ/オン&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ルーター再起動&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;システム設定 &amp;gt; ネットワーク &amp;gt; 詳細 &amp;gt; DNSをリセット&lt;/strong&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;9.4 バックアップ&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Time Machine&lt;/strong&gt;：外付けHDDで自動バックアップ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;iCloud&lt;/strong&gt;：重要ファイルをクラウド保存&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;手動コピー&lt;/strong&gt;：外付けSSDに定期的にコピー&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;10. 学習リソース&lt;/h2&gt;\n&lt;h3&gt;10.1 Mac の使い方&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Apple公式サポート&lt;/strong&gt;：support.apple.com/ja-jp&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;YouTube&lt;/strong&gt;：“Mac 初心者” で検索&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;10.2 プログラミング&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Progate&lt;/strong&gt;：ゲーム感覚で学べる（有料）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ドットインストール&lt;/strong&gt;：動画学習&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Udemy&lt;/strong&gt;：専門的なコース&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;YouTube&lt;/strong&gt;：無料チュートリアル多数&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;10.3 音楽制作&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;GarageBand チュートリアル&lt;/strong&gt;（Apple公式）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Logic Pro ユーザーガイド&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;YouTube&lt;/strong&gt;：“DTM 初心者”&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;10.4 動画編集&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;iMovie チュートリアル&lt;/strong&gt;（Apple公式）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Final Cut Pro 学習リソース&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;YouTube&lt;/strong&gt;：“動画編集 初心者”&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;11. まとめ：PCとの付き合い方&lt;/h2&gt;\n&lt;h3&gt;11.1 PCは「道具」である&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使いこなすには練習が必要&lt;/li&gt;\n&lt;li&gt;毎日少しずつ触ることが上達の鍵&lt;/li&gt;\n&lt;li&gt;失敗を恐れない（元に戻せる）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;11.2 インプットとアウトプットのバランス&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;情報収集ばかりにならない&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;実際に手を動かして作る&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;作品を公開して フィードバックをもらう&lt;/strong&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;11.3 学習の心構え&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;好奇心を持つ&lt;/strong&gt;：“これってどうやるんだろう？”&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;検索力を磨く&lt;/strong&gt;：“Mac ○○ やり方” で検索&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;失敗から学ぶ&lt;/strong&gt;：エラーは成長のチャンス&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;継続する&lt;/strong&gt;：毎日10分でもPCに触る&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3&gt;11.4 最初の1ヶ月でやること&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;input disabled=\&quot;\&quot; type=\&quot;checkbox\&quot;&gt; Macの基本操作に慣れる&lt;/li&gt;\n&lt;li&gt;&lt;input disabled=\&quot;\&quot; type=\&quot;checkbox\&quot;&gt; ショートカットを10個覚える&lt;/li&gt;\n&lt;li&gt;&lt;input disabled=\&quot;\&quot; type=\&quot;checkbox\&quot;&gt; ファイル整理の習慣をつける&lt;/li&gt;\n&lt;li&gt;&lt;input disabled=\&quot;\&quot; type=\&quot;checkbox\&quot;&gt; 1つアプリを使いこなす（メモ、ブラウザなど）&lt;/li&gt;\n&lt;li&gt;&lt;input disabled=\&quot;\&quot; type=\&quot;checkbox\&quot;&gt; 簡単なものを作ってみる（メモ、ブログ、音楽など）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;付録：用語集&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;GUI&lt;/strong&gt;（Graphical User Interface）：グラフィカルなインターフェイス（アイコン・マウス操作）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CLI&lt;/strong&gt;（Command Line Interface）：文字ベースのインターフェイス（ターミナル）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ディレクトリ&lt;/strong&gt;：フォルダのこと&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;パス&lt;/strong&gt;：ファイルの住所（例：/Users/username/Documents/file.txt）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;拡張子&lt;/strong&gt;：ファイル名の最後の「.txt」「.jpg」など&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;RAM&lt;/strong&gt;：メモリ、作業机の広さ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;SSD&lt;/strong&gt;：ストレージ、引き出しの容量&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CPU/チップ&lt;/strong&gt;：頭脳、処理速度&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;バックアップ&lt;/strong&gt;：データのコピー（保険）&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;クラウド&lt;/strong&gt;：インターネット上のストレージ&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;オープンソース&lt;/strong&gt;：無料で使えるソフトウェア&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;プラグイン&lt;/strong&gt;：機能拡張（アプリの中のアプリ）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;p&gt;&lt;strong&gt;このドキュメントがあなたのPC生活の第一歩になりますように。&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;質問・追加してほしい内容があればいつでも聞いてください！&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;RMS&quot;],&quot;title&quot;:[0,&quot;RMS&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/RMS&quot;],&quot;html&quot;:[0,&quot;&quot;]}],[0,{&quot;id&quot;:[0,&quot;Rust&quot;],&quot;title&quot;:[0,&quot;Rust&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Rust&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Rust_env?path=Rust_env\&quot;&gt;Rust_env&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;競プロ&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Bevy?path=Bevy\&quot;&gt;Bevy&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Tauri?path=Tauri\&quot;&gt;Tauri&lt;/a&gt;&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;読みたい記事&lt;br&gt;Rustに影響を与えた言語たち&lt;br&gt;Rustに貢献してみませんか？コントリビューターたちが語る開発の裏側とOSS活動の魅力&lt;/p&gt;\n&lt;p&gt;動画&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Rust_%E4%BE%BF%E5%88%A9%E6%A9%9F%E8%83%BD?path=Rust_%E4%BE%BF%E5%88%A9%E6%A9%9F%E8%83%BD\&quot;&gt;Rust_便利機能&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/%E6%89%80%E6%9C%89%E6%A8%A9%E3%82%B7%E3%82%B9%E3%83%86%E3%83%A0?path=%E6%89%80%E6%9C%89%E6%A8%A9%E3%82%B7%E3%82%B9%E3%83%86%E3%83%A0\&quot;&gt;所有権システム&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/unsafe%E3%81%AARust?path=unsafe%E3%81%AARust\&quot;&gt;unsafeなRust&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Rust_env&quot;],&quot;title&quot;:[0,&quot;Rust_env&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Rust_env&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=h8_oHd4ospQ&amp;list=PLboM456Obo1j-qSjNITmRahFbjNI235WR&amp;index=10\&quot;&gt;https://www.youtube.com/watch?v=h8_oHd4ospQ&amp;amp;list=PLboM456Obo1j-qSjNITmRahFbjNI235WR&amp;amp;index=10&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;rustup&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;rustc（コンパイラ）、cargoをインストールするためのCLT&lt;/li&gt;\n&lt;li&gt;windows - VisualStudioのビルドツールとWindows SDKが必要&lt;/li&gt;\n&lt;li&gt;UNIX系 - gcc or clangが必要&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;cargo&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Rustのプロジェクトをパッケージとして管理、ビルド、テスト&lt;/li&gt;\n&lt;li&gt;crates.io - パッケージのオンラインリポジトリ&lt;/li&gt;\n&lt;li&gt;rustcは使わず、cargoで作成、ビルドができる&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;rustup command&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;rustup doc&lt;/li&gt;\n&lt;li&gt;rustup update&lt;/li&gt;\n&lt;li&gt;rustup default　（すべてのプロジェクトのコンパイラを指定 nightly or stable）&lt;/li&gt;\n&lt;li&gt;rustup override （プロジェクトごとにコンパイラを指定）&lt;/li&gt;\n&lt;li&gt;rustup target&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;cargo command&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;cargo new&lt;/li&gt;\n&lt;li&gt;cargo init&lt;/li&gt;\n&lt;li&gt;cargo build&lt;/li&gt;\n&lt;li&gt;cargo build --relese&lt;/li&gt;\n&lt;li&gt;cargo run&lt;/li&gt;\n&lt;li&gt;cargo run --&lt;/li&gt;\n&lt;li&gt;cargo add&lt;/li&gt;\n&lt;li&gt;cargo remove&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;cargo.toml&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;[package]\nname = &amp;quot;hello_world&amp;quot;\nversion = &amp;quot;0.1.0&amp;quot;\nedition = &amp;quot;2024&amp;quot;\n\n[dependencies]\nここにパッケージを記載\n例）\nregex = &amp;quot;1.8.1&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;クロスコンパイル&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;例）Apple silicon macからintel macへ&lt;br&gt;&lt;code&gt;rustup target add x86_64-apple-darwin&lt;/code&gt;&lt;br&gt;&lt;code&gt;cargo build --target x86_64-apple-darwin&lt;/code&gt;&lt;br&gt;&lt;a href=\&quot;https://doc.rust-lang.org/nightly/rustc/platform-support.html\&quot;&gt;https://doc.rust-lang.org/nightly/rustc/platform-support.html&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;./.cargo/config.tomlにつぎを設定すると自動クロスコンパイル&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code&gt;[build]\ntarget = &amp;quot;i686-pc-windows-msvc&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;他プラットフォーム間のクロスコンパイル&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;cross&lt;ul&gt;\n&lt;li&gt;Dockerを用意してその中でビルドしてくれる&lt;/li&gt;\n&lt;li&gt;Docker Desktopが必要&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;workspace&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;サブプロジェクトを扱える&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;clippy&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;cargoに入っている、よりよいコードを提案してくれるやつ&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;VScodeの設定&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;rust-analyzerプラグイン&lt;ul&gt;\n&lt;li&gt;rust-analyzer.check.commandをclippyに設定&lt;/li&gt;\n&lt;li&gt;QuickFixにも対応&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Rust_便利機能&quot;],&quot;title&quot;:[0,&quot;Rust_便利機能&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Rust_便利機能&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=aAno_ufE7Go\&quot;&gt;https://www.youtube.com/watch?v=aAno_ufE7Go&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;イテレーター系&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;collect()メソッド&lt;br&gt; 生成する型としてStringやResultを指定できる&lt;/li&gt;\n&lt;li&gt;enumerate()メソッドとzip()メソッド&lt;ul&gt;\n&lt;li&gt;enumerate() - リストの要素とイテレーション数とが同時に必要な時に使える&lt;/li&gt;\n&lt;li&gt;zip() - そのイテレーターの要素と別のイテレーターの要素を同時に一つずつ走査（一つの事柄を複数のリストに分けて管理しているときに内容を同時に取り出したいときに使える）&lt;br&gt;パターンマッチ系（match構文）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;if-let let-else&lt;br&gt; パターンマッチを使って値を取り出すと同時に処理を分岐する。&lt;br&gt; OptionがSomeかどうかを確認して、Someであれば中の値を取り出す&lt;/li&gt;\n&lt;li&gt;matches!()マクロ&lt;br&gt; 値がパターンに一致するかを確認し、その結果をboolで返すマクロ（match構文と一緒）条件式に使う用。見た目的にmatches!()マクロのほうがいいかも？&lt;/li&gt;\n&lt;/ol&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-rust\&quot;&gt;fn main(){\n\tlet num = 7144;\n\tif [7, 71, 714, 7144].contains(&amp;amp;num){\n\t\tprintln!(&amp;quot;hit!&amp;quot;);\n\t}\n\t\n\tlet num = 7144;\n\tif matches!(num, 7 | 71 | 714 | 7144){\n\t\tprintln!(&amp;quot;hit!&amp;quot;);\n\t}\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;標準ライブラリ&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;std::memのtake() replace()&lt;br&gt; 引数に値を要求する関数には構造体のフィールドを直接適用することはできないので、一度フィールドから値として取り出してから適用しなければならないが、これらで簡単に取り出せる。元の変数には、take()は型の初期値、replace()は指定した値が入る。&lt;/li&gt;\n&lt;li&gt;std::num::NonZero;&lt;br&gt;変数に0が入らないことを保証できる。データの異常値を0で表現せずに、OptionやResultで表現するときに使える。&lt;br&gt;その他&lt;/li&gt;\n&lt;li&gt;deriveアトリビュート&lt;br&gt; トレイトを自動生成&lt;/li&gt;\n&lt;li&gt;testアトリビュート&lt;br&gt; cargoのテストランナーでテストコードを実行する用&lt;/li&gt;\n&lt;li&gt;cfgアトリビュートとcfg!()マクロ&lt;br&gt; コンパイル時のフラグによってコンパイルされるコードを変えるための機能。データの出力先やログ設定などをリリース用かデバッグ用かで切り替えたりできる。&lt;/li&gt;\n&lt;li&gt;RUST_BACKTRACE=1&lt;br&gt;バグツリー&lt;/li&gt;\n&lt;/ol&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;SteamOS&quot;],&quot;title&quot;:[0,&quot;SteamOS&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/SteamOS&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/SteamOS%E3%81%A7%E6%97%A5%E6%9C%AC%E8%AA%9E%E5%85%A5%E5%8A%9B?path=SteamOS%E3%81%A7%E6%97%A5%E6%9C%AC%E8%AA%9E%E5%85%A5%E5%8A%9B\&quot;&gt;SteamOSで日本語入力&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;SteamOSで日本語入力&quot;],&quot;title&quot;:[0,&quot;SteamOSで日本語入力&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/SteamOSで日本語入力&quot;],&quot;html&quot;:[0,&quot;&lt;ol&gt;\n&lt;li&gt;flatpak(Discover)でfcitxをインストール&lt;ul&gt;\n&lt;li&gt;fcitx5, fcitx5用のMozc&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;.xprofileにfcitxを設定&lt;/li&gt;\n&lt;/ol&gt;\n&lt;pre&gt;&lt;code&gt;export GTK_IM_MODULE=fcitx\nexport QT_IM_MODULE=fcitx\nexport XMODIFIERS=@im=fcitx\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ol start=\&quot;3\&quot;&gt;\n&lt;li&gt;Fcitxの設定で入力メソッドにMozcを追加（←）&lt;/li&gt;\n&lt;/ol&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;TDA_env&quot;],&quot;title&quot;:[0,&quot;TDA_env&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/TDA_env&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;TouchDesigner.app&lt;br&gt;\tContents&lt;br&gt;\t\tResources&lt;br&gt;\t\t\ttfs&lt;br&gt;\t\t\t\tSamples&lt;br&gt;\t\t\t\t\tTDAbleton&lt;br&gt;\t\t\t\t\t\tLive 11+&lt;br&gt;\t\t\t\t\t\t\tTouchDesigner&lt;br&gt;を&lt;br&gt;Ableton Live 12 Suite.app&lt;br&gt;\tContents&lt;br&gt;\t\tApp-Resources&lt;br&gt;\t\t\tMIDI Remote Scripts&lt;br&gt;のなかにコピー&lt;/p&gt;\n&lt;p&gt;さらにLiveの『場所』にもコピー&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Tauri&quot;],&quot;title&quot;:[0,&quot;Tauri&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Tauri&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;https://v2.tauri.app/start/\&quot;&gt;https://v2.tauri.app/start/&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;https://github.com/tauri-apps/awesome-tauri?tab=readme-ov-file#integrations\&quot;&gt;https://github.com/tauri-apps/awesome-tauri?tab=readme-ov-file#integrations&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Tauri_env?path=Tauri_env\&quot;&gt;Tauri_env&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;Tauri_env&quot;],&quot;title&quot;:[0,&quot;Tauri_env&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/Tauri_env&quot;],&quot;html&quot;:[0,&quot;&lt;h4&gt;環境構築（Desktop版）&lt;/h4&gt;\n&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://v2.tauri.app/ja/start/create-project/\&quot;&gt;https://v2.tauri.app/ja/start/create-project/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;create-tauri-appのインストール&lt;br&gt;&lt;code&gt;cargo install create-tauri-app --locked&lt;/code&gt;&lt;br&gt;tauri CLIのインストール&lt;br&gt;&lt;code&gt;cargo install tauri-cli --version &amp;quot;^2.0.0&amp;quot; --locked&lt;/code&gt;&lt;/p&gt;\n&lt;h4&gt;プロジェクトの作成&lt;/h4&gt;\n&lt;p&gt;tauriプロジェクトの作成&lt;br&gt;&lt;code&gt;cargo create-tauri-app&lt;/code&gt;&lt;br&gt;開発サーバーの起動&lt;br&gt;tauriプロジェクトディレクトリで&lt;br&gt;&lt;code&gt;cargo tauri dev&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;フロントエンドの言語&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Rust&lt;/li&gt;\n&lt;li&gt;TypeScript / JavaScript&lt;/li&gt;\n&lt;li&gt;.NET&lt;br&gt;パッケージマネジャー&lt;/li&gt;\n&lt;li&gt;Vanilla(html + css + js)&lt;/li&gt;\n&lt;li&gt;yew(Rust:フロントエンドもRustで開発)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;モバイルアプリ開発&lt;/h4&gt;\n&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=gE7OxH0Xb1Y\&quot;&gt;https://www.youtube.com/watch?v=gE7OxH0Xb1Y&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;各プラットフォーム固有の機能を使うには、Kotlin SwiftをTauriプラグインとして実装して使う&lt;/p&gt;\n&lt;hr&gt;\n&lt;h4&gt;環境構築（Docker,Debian編）&lt;/h4&gt;\n&lt;p&gt;&lt;a href=\&quot;https://v2.tauri.app/ja/start/prerequisites/\&quot;&gt;https://v2.tauri.app/ja/start/prerequisites/&lt;/a&gt;&lt;br&gt;いろいろインストール&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;sudo apt update\nsudo apt install libwebkit2gtk-4.1-dev \\\nbuild-essential \\\ncurl \\\nwget \\\nfile \\\nlibxdo-dev \\\nlibssl-dev \\\nlibayatana-appindicator3-dev \\\nlibrsvg2-dev\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;これもしないとかも&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;sudo apt update\nsudo apt install -y libwebkit2gtk-4.0-dev librsvg2-dev\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;rustインストール&lt;br&gt;&lt;code&gt;curl --proto &amp;#39;=https&amp;#39; --tlsv1.2 https://sh.rustup.rs -sSf | sh&lt;/code&gt;&lt;br&gt;パス通す&lt;br&gt;&lt;code&gt;echo &amp;#39;export PATH=&amp;quot;$HOME/.cargo/bin:$PATH&amp;quot;&amp;#39; &amp;gt;&amp;gt; ~/.bashrc&lt;/code&gt;&lt;br&gt;&lt;code&gt;source ~/.bashrc&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;nvmでnode,npmインストール&lt;br&gt;&lt;a href=\&quot;https://nodejs.org/ja/download\&quot;&gt;https://nodejs.org/ja/download&lt;/a&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;# nvmをダウンロードしてインストールする：\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.2/install.sh | bash\n# シェルを再起動する代わりに実行する\n\\. &amp;quot;$HOME/.nvm/nvm.sh&amp;quot;\n# Node.jsをダウンロードしてインストールする：\nnvm install 22\n# Node.jsのバージョンを確認する：\nnode -v # &amp;quot;v22.14.0&amp;quot;が表示される。\nnvm current # &amp;quot;v22.14.0&amp;quot;が表示される。\n# npmのバージョンを確認する：\nnpm -v # &amp;quot;10.9.2&amp;quot;が表示される。\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;パスを通す&lt;br&gt;&lt;code&gt;echo &amp;#39;export PATH=&amp;quot;$HOME/.cargo/bin:$HOME/.npmglobal/bin:$HOME/.nvm/versions/node/$(node -v)/bin:$PATH&amp;quot;&amp;#39; &amp;gt;&amp;gt; ~/.bashrc&lt;/code&gt;&lt;br&gt;&lt;code&gt;source ~/.bashrc&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;プロジェクトを作成&lt;br&gt;&lt;code&gt;npm create tauri-app@latest&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;プロジェクトを開発サーバーで実行&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;cd tauri-app\nnpm install\nnpm run tauri dev\n&lt;/code&gt;&lt;/pre&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;ZorinOS&quot;],&quot;title&quot;:[0,&quot;ZorinOS&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/ZorinOS&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;日本語入力&lt;br&gt;MacBookAir-ZorinOSでMacキーボードのとおり、なんとか日本語入力ができるようになりました｜IRONAMI&lt;/p&gt;\n&lt;p&gt;Reaper&lt;br&gt;Zorin OSで格安ノートPCにDTM環境を構築出来るか試した話｜睦涼（むつみりょう）&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;_home&quot;],&quot;title&quot;:[0,&quot;_home&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/_home&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;開発&lt;br&gt;web-synth&lt;br&gt;開発環境&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/github-repo-list?path=github-repo-list\&quot;&gt;github-repo-list&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/%E9%96%8B%E7%99%BA%E7%92%B0%E5%A2%832025?path=%E9%96%8B%E7%99%BA%E7%92%B0%E5%A2%832025\&quot;&gt;開発環境2025&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/dotfiles%E3%82%92%E4%BD%9C%E3%82%8A%E3%81%9F%E3%81%84?path=dotfiles%E3%82%92%E4%BD%9C%E3%82%8A%E3%81%9F%E3%81%84\&quot;&gt;dotfilesを作りたい&lt;/a&gt;&lt;br&gt;環境構築&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/cursor_env?path=cursor_env\&quot;&gt;cursor_env&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Rust_env?path=Rust_env\&quot;&gt;Rust_env&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Tauri_env?path=Tauri_env\&quot;&gt;Tauri_env&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Bevy(Rust)_env?path=Bevy(Rust)_env\&quot;&gt;Bevy(Rust)_env&lt;/a&gt;&lt;br&gt;言語&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Rust?path=Rust\&quot;&gt;Rust&lt;/a&gt;&lt;br&gt;フレームワーク&lt;br&gt;Tips&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/short-cut-key?path=short-cut-key\&quot;&gt;short-cut-key&lt;/a&gt;&lt;br&gt;設定備忘録&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/ZorinOS?path=ZorinOS\&quot;&gt;ZorinOS&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/SteamOS?path=SteamOS\&quot;&gt;SteamOS&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/PC%E3%81%AE%E5%A8%81%E5%8A%9B%E3%82%92%E5%88%9D%E5%BF%83%E8%80%85%E3%81%AB%E6%95%99%E3%81%88%E3%82%8B?path=PC%E3%81%AE%E5%A8%81%E5%8A%9B%E3%82%92%E5%88%9D%E5%BF%83%E8%80%85%E3%81%AB%E6%95%99%E3%81%88%E3%82%8B\&quot;&gt;PCの威力を初心者に教える&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/homepage%E5%90%91%E3%81%91web%E6%8A%80%E8%A1%93?path=homepage%E5%90%91%E3%81%91web%E6%8A%80%E8%A1%93\&quot;&gt;homepage向けweb技術&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Godot%E3%81%A7Lowpoly?path=Godot%E3%81%A7Lowpoly\&quot;&gt;GodotでLowpoly&lt;/a&gt;&lt;br&gt;Godotで3Dゲーム作りたいな&lt;br&gt;Godotの仕様&lt;br&gt;Godotで3D音響空間再現&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/pyxel%E3%81%A7%E3%82%B2%E3%83%BC%E3%83%A0%E4%BD%9C%E3%82%8A%E3%81%AE%E5%B7%A5%E7%A8%8B%E3%82%92%E5%85%A8%E3%81%A6%E4%BD%93%E9%A8%93%E3%81%97%E3%81%A6%E3%81%BF%E3%81%9F?path=pyxel%E3%81%A7%E3%82%B2%E3%83%BC%E3%83%A0%E4%BD%9C%E3%82%8A%E3%81%AE%E5%B7%A5%E7%A8%8B%E3%82%92%E5%85%A8%E3%81%A6%E4%BD%93%E9%A8%93%E3%81%97%E3%81%A6%E3%81%BF%E3%81%9F\&quot;&gt;pyxelでゲーム作りの工程を全て体験してみた&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/LogicPro%E3%81%AE%E6%80%9D%E6%83%B3?path=LogicPro%E3%81%AE%E6%80%9D%E6%83%B3\&quot;&gt;LogicProの思想&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/AbletonLive%E3%81%AE%E6%80%9D%E6%83%B3?path=AbletonLive%E3%81%AE%E6%80%9D%E6%83%B3\&quot;&gt;AbletonLiveの思想&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/dtm_mixing_resources?path=dtm_mixing_resources\&quot;&gt;dtm_mixing_resources&lt;/a&gt;&lt;br&gt;フリーシンセの思想をまとめる&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/TDA_env?path=TDA_env\&quot;&gt;TDA_env&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;/nattsu-gallery/article/_home/Data%E3%81%A8%E3%81%8BTool%E3%81%A8%E3%81%8B%E3%81%AE%E8%A9%B1?path=Data%E3%81%A8%E3%81%8BTool%E3%81%A8%E3%81%8B%E3%81%AE%E8%A9%B1\&quot;&gt;DataとかToolとかの話&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;cursor_env&quot;],&quot;title&quot;:[0,&quot;cursor_env&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/cursor_env&quot;],&quot;html&quot;:[0,&quot;&lt;h1&gt;pythonモジュール&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;p&gt;youtube-transcipt-api&lt;br&gt;  &lt;code&gt;pip3 install --user --break-system-packages youtube-transcript-api&lt;/code&gt;&lt;br&gt;  mac標準のpip3でmacのシステム環境に導入&lt;br&gt;  homebrewと競合するので、--user --break-system-packagesをつける&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;yt-dlp&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;dotfilesを作りたい&quot;],&quot;title&quot;:[0,&quot;dotfilesを作りたい&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/dotfilesを作りたい&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;github:&lt;br&gt;&lt;a href=\&quot;https://github.com/nattsu628878/dotfiles-mac\&quot;&gt;https://github.com/nattsu628878/dotfiles-mac&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;https://github.com/nattsu628878/dotfiles-win\&quot;&gt;https://github.com/nattsu628878/dotfiles-win&lt;/a&gt;&lt;/p&gt;\n&lt;h1&gt;OSX&lt;/h1&gt;\n&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://qiita.com/kez/items/e349a8d025acbcdc3a86\&quot;&gt;https://qiita.com/kez/items/e349a8d025acbcdc3a86&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;https://github.com/yoshimi-I/dotfiles\&quot;&gt;https://github.com/yoshimi-I/dotfiles&lt;/a&gt;&lt;/p&gt;\n&lt;h4&gt;ディレクトリ構成&lt;/h4&gt;\n&lt;p&gt;link.sh&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;#!/bin/zsh\n\nSCRIPT_DIR=&amp;quot;$(cd &amp;quot;$(dirname &amp;quot;$0&amp;quot;)&amp;quot; &amp;amp;&amp;amp; pwd)&amp;quot;\necho SCRIPT_DIR\n\n\nfor dotfile in &amp;quot;${SCRIPT_DIR}&amp;quot;/.??* ; do\n    &amp;quot;$dotfile&amp;quot; == &amp;quot;${SCRIPT_DIR}/.git&amp;quot; &amp;amp;&amp;amp; continue\n    &amp;quot;$dotfile&amp;quot; == &amp;quot;${SCRIPT_DIR}/.github&amp;quot; &amp;amp;&amp;amp; continue\n    &amp;quot;$dotfile&amp;quot; == &amp;quot;${SCRIPT_DIR}/.DS_Store&amp;quot; &amp;amp;&amp;amp; continue\n\n    ln -fnsv &amp;quot;$dotfile&amp;quot; &amp;quot;$HOME&amp;quot;\ndone\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;default&lt;br&gt;&lt;a href=\&quot;https://zenn.dev/keyamin/articles/970af2dca9c4c5\&quot;&gt;https://zenn.dev/keyamin/articles/970af2dca9c4c5&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;.Brewfile&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;tap &amp;quot;homebrew/bundle&amp;quot;\ncask &amp;quot;cursor&amp;quot;\ncask &amp;quot;deepl&amp;quot;\ncask &amp;quot;discord&amp;quot;\ncask &amp;quot;firefox&amp;quot;\ncask &amp;quot;notion&amp;quot;\ncask &amp;quot;obs&amp;quot;\ncask &amp;quot;obsidian&amp;quot;\ncask &amp;quot;scroll-reverser&amp;quot;\ncask &amp;quot;touchdesigner&amp;quot;\nvscode &amp;quot;ms-ceintl.vscode-language-pack-ja&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h1&gt;Windows&lt;/h1&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;dtm_mixing_resources&quot;],&quot;title&quot;:[0,&quot;dtm_mixing_resources&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/dtm_mixing_resources&quot;],&quot;html&quot;:[0,&quot;&lt;h1&gt;DTM / Mixing Learning Resources&lt;/h1&gt;\n&lt;h2&gt;🌐 Websites&lt;/h2&gt;\n&lt;h3&gt;Sound On Sound&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Professional audio production magazine&lt;/li&gt;\n&lt;li&gt;Key articles: Mix Rescue, Inside Track&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.soundonsound.com\&quot;&gt;https://www.soundonsound.com&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;iZotope (Learn Section)&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Mixing and mastering tutorials&lt;/li&gt;\n&lt;li&gt;Focus on EQ, balance, and audio processing&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.izotope.com/en/learn.html\&quot;&gt;https://www.izotope.com/en/learn.html&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;LANDR&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Beginner-friendly guides with visuals&lt;/li&gt;\n&lt;li&gt;Covers EQ, genre techniques, and workflows&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.landr.com/blog/\&quot;&gt;https://www.landr.com/blog/&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Puremix&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Tutorials from professional mix engineers&lt;/li&gt;\n&lt;li&gt;Real session breakdowns&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.puremix.net\&quot;&gt;https://www.puremix.net&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;📺 YouTube Channels&lt;/h2&gt;\n&lt;h3&gt;Fab Dupont&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Professional mixing techniques&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.youtube.com/@Puremix\&quot;&gt;https://www.youtube.com/@Puremix&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Andrew Huang&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Creative music production and experiments&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.youtube.com/@andrewhuang\&quot;&gt;https://www.youtube.com/@andrewhuang&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Rick Beato&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Music theory and production insights&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://www.youtube.com/@RickBeato\&quot;&gt;https://www.youtube.com/@RickBeato&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;📚 Books&lt;/h2&gt;\n&lt;h3&gt;Mixing Secrets for the Small Studio -- Mike Senior&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Comprehensive mixing guide&lt;/li&gt;\n&lt;li&gt;Focus on EQ and frequency balance&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;The Art of Mixing -- David Gibson&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Visual approach to mixing concepts&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Mastering Audio -- Bob Katz&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Advanced mastering and audio theory&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;🧠 Notes&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;50--100Hz: Low-end weight&lt;/li&gt;\n&lt;li&gt;100--200Hz: Body&lt;/li&gt;\n&lt;li&gt;2k--5kHz: Attack (e.g. kick punch)&lt;/li&gt;\n&lt;li&gt;8kHz+: Air / brightness&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;💡 Idea: EQ Knowledge Base&lt;/h2&gt;\n&lt;p&gt;Example JSON structure:&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-json\&quot;&gt;{\n  &amp;quot;name&amp;quot;: &amp;quot;Kick Punch&amp;quot;,\n  &amp;quot;description&amp;quot;: &amp;quot;Enhance attack&amp;quot;,\n  &amp;quot;eq&amp;quot;: [\n    { &amp;quot;freq&amp;quot;: 4500, &amp;quot;gain&amp;quot;: 4, &amp;quot;q&amp;quot;: 1.2 }\n  ],\n  &amp;quot;tags&amp;quot;: [&amp;quot;kick&amp;quot;, &amp;quot;attack&amp;quot;]\n}\n&lt;/code&gt;&lt;/pre&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;github-repo-list&quot;],&quot;title&quot;:[0,&quot;github-repo-list&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/github-repo-list&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;dev&lt;br&gt;\tlab（ごちゃごちゃ、テスト、勉強、ゲームエンジンのプロジェクトファイルなど）&lt;br&gt;\t\t...&lt;br&gt;\ttool-box（簡易webアプリ）&lt;br&gt;\t\t...&lt;br&gt;\tproject（アプリ・ちゃんとバージョン管理したいもの）&lt;br&gt;\t\tnattsu-gallery&lt;br&gt;\t\tsynth-builder&lt;br&gt;\t\tmusic-visualizer&lt;br&gt;\t\t...&lt;/p&gt;\n&lt;p&gt; github repository&lt;br&gt;\tlab&lt;br&gt;\ttool-box&lt;br&gt;\t---&lt;br&gt;\t(project)&lt;br&gt;\tnattsu-gallery&lt;br&gt;\tsynth-builder&lt;br&gt;\tmusic-visualizer&lt;br&gt;\t...\n\t&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;homepage向けweb技術&quot;],&quot;title&quot;:[0,&quot;homepage向けweb技術&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/homepage向けweb技術&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;https://chatgpt.com/share/694e463b-6528-8010-a2e4-772114d7f886\&quot;&gt;https://chatgpt.com/share/694e463b-6528-8010-a2e4-772114d7f886&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Astro + Svelte&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://docs.astro.build/ja/getting-started/\&quot;&gt;https://docs.astro.build/ja/getting-started/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;アイランドアーキテクチャというものがあるらしい。&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Astroは&lt;strong&gt;アイランドアーキテクチャ&lt;/strong&gt;と呼ばれる新しいフロントエンドアーキテクチャパターンを提唱し、普及させました。アイランドアーキテクチャでは、ページの大部分を高速な静的HTMLとしてレンダリングし、インタラクティブ性やパーソナライズが必要な箇所に小さなJavaScriptの”アイランド”を追加します（たとえば、画像カルーセルなど）。これにより、多くのモダンJavaScriptフレームワークで問題となる巨大なJavaScriptペイロードによるレスポンス低下を防げます。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;md-first設計&lt;br&gt;webは静的で読むもの。そこに動的アプリが付随。&lt;/p&gt;\n&lt;p&gt;Astro&lt;br&gt;\t個人ブログなので、あくまで静的、&lt;br&gt;Svelteを島として追加&lt;br&gt;\t開発のデモとかはsvelteで、&lt;/p&gt;\n&lt;p&gt;基本構造&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;src/\n├─ pages/              # URLになるページ（Astro）\n│   ├─ index.astro\n│   └─ demos.astro\n│\n├─ components/\n│   ├─ svelte/         # Svelteコンポーネント（島）\n│   │   └─ Counter.svelte\n│   └─ astro/          # Astro専用コンポーネント\n│       └─ Layout.astro\n│\n├─ content/            # md / mdx（記事・設計書）\n│   └─ posts/\n│       └─ design.md\n│\n├─ layouts/            # ページ共通レイアウト\n│   └─ BaseLayout.astro\n│\n└─ styles/\n    └─ global.css\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;デモ付き&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;src/\n├─ pages/\n│   ├─ index.astro\n│   └─ demos/\n│       ├─ spectrum.astro\n│       ├─ waveform.astro\n│       └─ synth.astro\n│\n├─ components/\n│   ├─ svelte/\n│   │   ├─ audio/\n│   │   │   ├─ Oscillator.svelte\n│   │   │   └─ AudioContext.svelte\n│   │   ├─ viz/\n│   │   │   ├─ Waveform.svelte\n│   │   │   └─ Spectrum.svelte\n│   │   └─ ui/\n│   │       └─ Knob.svelte\n│   └─ astro/\n│       └─ DemoFrame.astro\n│\n├─ content/\n│   └─ research/\n│       └─ dsp.md\n&lt;/code&gt;&lt;/pre&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;pyxelでゲーム作りの工程を全て体験してみた&quot;],&quot;title&quot;:[0,&quot;pyxelでゲーム作りの工程を全て体験してみた&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/pyxelでゲーム作りの工程を全て体験してみた&quot;],&quot;html&quot;:[0,&quot;&quot;]}],[0,{&quot;id&quot;:[0,&quot;short-cut-key&quot;],&quot;title&quot;:[0,&quot;short-cut-key&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/short-cut-key&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;Mac&lt;br&gt;\tChatGPT&lt;br&gt;\t\toption + space&lt;br&gt;\tDeepL&lt;br&gt;\t\tcmd + c + c&lt;/p&gt;\n&lt;p&gt;Windows（macと同じ配置＆winキーは一番左へ）&lt;br&gt;\t変更&lt;br&gt;\t\tctrl = win&lt;br&gt;\t\twin = alt&lt;br&gt;\t\talt = ctrl&lt;br&gt;\t\tcaps lock = none&lt;br&gt;\tAdvanced Paste&lt;br&gt;\t\tcmd + shift + v&lt;br&gt;\tChatGPT&lt;br&gt;\t\talt + space&lt;br&gt;\tDeepL&lt;br&gt;\t\tctrl + c + c\n\t\t&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;unsafeなRust&quot;],&quot;title&quot;:[0,&quot;unsafeなRust&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/unsafeなRust&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=lx86iUb2xiI\&quot;&gt;https://www.youtube.com/watch?v=lx86iUb2xiI&lt;/a&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;unsafeブロック&lt;/li&gt;\n&lt;li&gt;unsafe impl&lt;/li&gt;\n&lt;li&gt;unsafe externブロック&lt;/li&gt;\n&lt;li&gt;unsafe属性&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;unsafeブロック&lt;/h4&gt;\n&lt;p&gt;&lt;code&gt;unsafe {}&lt;/code&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;ポインター外し&lt;/li&gt;\n&lt;li&gt;unionのフィールドの使用&lt;/li&gt;\n&lt;li&gt;static mut（グローバル変数）の使用&lt;/li&gt;\n&lt;li&gt;インラインアセンブリの使用 - &lt;code&gt;asm!()&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;unsafe関数の使用&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;unsafe impl&lt;/h4&gt;\n&lt;p&gt;unsafe trainを実装するためのもの&lt;br&gt;SendトレイトとSyncトレイト&lt;br&gt;プログラマーが能動的にimplすることが安全かどうかをコンパイラーが保証できない&lt;/p&gt;\n&lt;h4&gt;unsafe externブロック&lt;/h4&gt;\n&lt;p&gt;externブロック - Rust以外の言語で実装した関数を呼び出せる&lt;/p&gt;\n&lt;h4&gt;unsafe属性&lt;/h4&gt;\n&lt;p&gt;関数に付ける属性のうち、export_name no_mangle link_sectionで必要&lt;/p&gt;\n&lt;p&gt;参考：&lt;br&gt;&lt;a href=\&quot;https://doc.rust-jp.rs/book-ja/ch19-01-unsafe-rust.html\&quot;&gt;https://doc.rust-jp.rs/book-ja/ch19-01-unsafe-rust.html&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;コンピュータシステムの理論と実装 with Turing Complete&quot;],&quot;title&quot;:[0,&quot;コンピュータシステムの理論と実装 with Turing Complete&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/コンピュータシステムの理論と実装 with Turing Complete&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;&lt;a href=\&quot;https://www.oreilly.co.jp/books/9784814400874/\&quot;&gt;https://www.oreilly.co.jp/books/9784814400874/&lt;/a&gt;&lt;br&gt;&lt;a href=\&quot;https://akademeia.info/?page_id=32179\&quot;&gt;https://akademeia.info/?page_id=32179&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;所有権システム&quot;],&quot;title&quot;:[0,&quot;所有権システム&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/所有権システム&quot;],&quot;html&quot;:[0,&quot;&lt;p&gt;【Rust】所有権システムはなぜ必要だったのか？ - あまつ楓&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=48MmNY7wYKU\&quot;&gt;https://www.youtube.com/watch?v=48MmNY7wYKU&lt;/a&gt;&lt;/p&gt;\n&quot;]}],[0,{&quot;id&quot;:[0,&quot;開発環境2025&quot;],&quot;title&quot;:[0,&quot;開発環境2025&quot;],&quot;breadcrumb&quot;:[0,&quot;_home/開発環境2025&quot;],&quot;html&quot;:[0,&quot;&lt;h1&gt;win&lt;/h1&gt;\n&lt;p&gt;模式図：&lt;/p&gt;\n&lt;p&gt;Unity&lt;br&gt;VisualStudio2022&lt;/p&gt;\n&lt;h4&gt;WSL Ubuntu&lt;/h4&gt;\n&lt;p&gt;docker&lt;br&gt;devcontainer&lt;br&gt;ncdu(容量確認用)&lt;br&gt;&lt;code&gt;ncdu --exclude=mnt&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;いつかはこんな感じでdockerfileとdevcontainer.jsonを自作して構築しようかな&lt;br&gt;&lt;a href=\&quot;https://github.com/amatzk/docker-template-for-vscode\&quot;&gt;https://github.com/amatzk/docker-template-for-vscode&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Debian(Tauri(デスクトップアプリ))&lt;br&gt;\tNode.js&lt;br&gt;\tnpm&lt;br&gt;\ttauriCLI&lt;/p&gt;\n&lt;p&gt;Debian(Rust環境)&lt;br&gt;\trustup&lt;br&gt;\tcargo&lt;/p&gt;\n&lt;p&gt;Ubuntu(C/C++)&lt;br&gt;\tgcc&lt;br&gt;\tg++&lt;br&gt;&lt;a href=\&quot;https://www.youtube.com/watch?v=JZ3VrYhTrZ8\&quot;&gt;https://www.youtube.com/watch?v=JZ3VrYhTrZ8&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Debian(Python)&lt;br&gt;\trye&lt;br&gt;\tclang&lt;/p&gt;\n&lt;hr&gt;\n&lt;h1&gt;mac&lt;/h1&gt;\n&lt;p&gt;Xcode&lt;/p&gt;\n&lt;p&gt;docker+devcontainer環境&lt;br&gt;&lt;a href=\&quot;https://github.com/kanaru-ssk/dev\&quot;&gt;https://github.com/kanaru-ssk/dev&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Ubuntu&lt;/p&gt;\n&lt;p&gt;git&lt;br&gt;docker&lt;br&gt;rust&lt;br&gt;tauri&lt;/p&gt;\n&quot;]}]]]}" ssr client="only" opts="{&quot;name&quot;:&quot;ArticleView&quot;,&quot;value&quot;:&quot;svelte&quot;}"></astro-island> </body></html>
