<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/site-static/nattsu_320_320_tt.ico" type="image/x-icon" sizes="any">
    <link rel="apple-touch-icon" href="/site-static/nattsu_320_320_tt.png">
    <title>natʇsu</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="container">
      <header>
        <div class="header-row header-row-top">
          <h1 class="header-title">natʇsu</h1>
          <div class="mode-toggle" id="modeToggle">
            <button id="modeOpusBtn" class="view-btn active">Opus</button>
            <button id="modeAboutBtn" class="view-btn">About Me</button>
            <button id="modeArticleBtn" class="view-btn">Article</button>
          </div>
        </div>
        <div class="header-row header-row-bottom is-hidden" id="opusHeaderRow">
          <div class="header-controls">
            <div id="headerGridControls" class="header-view-controls" style="display: none;">
              <div class="setting-item">
                <label for="gridCardShape">Shape</label>
                <select id="gridCardShape">
                  <option value="fit" selected>Fit</option>
                  <option value="square">Square</option>
                </select>
              </div>
            </div>
            <div id="headerTypeFilters" class="header-view-controls header-type-filters">
              <div class="setting-item type-filter-group">
                <span class="type-filter-label">Type</span>
                <button type="button" class="filter-toggle filter-toggle--on" id="filterToggleMovie" data-type-filter="movie" aria-pressed="true">Video</button>
                <button type="button" class="filter-toggle filter-toggle--on" id="filterTogglePicture" data-type-filter="picture" aria-pressed="true">Image</button>
              </div>
            </div>
            <div id="headerTableControls" class="header-view-controls" style="display: none;">
              <div class="setting-item">
                <label for="sortOrderTable">Sort</label>
                <select id="sortOrderTable">
                  <option value="asc">Date</option>
                  <option value="desc">Date (rev)</option>
                </select>
              </div>
              <div class="setting-item">
                <label for="filterTagTable">Tag</label>
                <select id="filterTagTable">
                  <option value="">All</option>
                </select>
              </div>
            </div>
            <div class="view-toggle">
              <button id="gridViewBtn" class="view-btn active">Grid</button>
              <button id="tableViewBtn" class="view-btn">Table</button>
              <button id="simpleViewBtn" class="view-btn">Simple</button>
            </div>
          </div>
        </div>
      </header>
        <main>
            <section id="modeOpus" class="mode-section">
              <div class="gallery" id="gallery">
                  <p class="loading-msg">Loading...</p>
              </div>
              <div class="table-view" id="tableView" style="display: none;"></div>
              <div class="simple-view" id="simpleView" style="display: none;"></div>
            </section>
        </main>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
