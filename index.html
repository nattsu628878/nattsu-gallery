<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/site-static/nattsu_320_320_tt.ico" type="image/x-icon" sizes="any">
    <link rel="apple-touch-icon" href="/site-static/nattsu_320_320_tt.png">
    <title>natʇsu</title>
    <meta http-equiv="refresh" content="0; url=/pages/opus/">
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        if (mode === 'about') {
          window.location.replace('/pages/aboutme/' + window.location.hash);
          return;
        }
        if (mode === 'nt') {
          window.location.replace('/pages/nt/' + window.location.hash);
          return;
        }
        window.location.replace('/pages/opus/' + window.location.search + window.location.hash);
      })();
    </script>
</head>
<body>
    <p><a href="/pages/opus/">Go to opus page</a></p>
</body>
