<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nattsu Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
      <header>
        <h1 class="header-title">Gallery</h1>
        <div class="header-controls">
          <div id="headerGridControls" class="header-view-controls" style="display: none;">
            <div class="setting-item">
              <label for="gridCardShape">Shape</label>
              <select id="gridCardShape">
                <option value="fit">Fit</option>
                <option value="square">Square</option>
              </select>
            </div>
          </div>
          <div id="headerTableControls" class="header-view-controls" style="display: none;">
            <div class="setting-item">
              <label for="sortOrderTable">Sort</label>
              <select id="sortOrderTable">
                <option value="asc">Date</option>
                <option value="desc">Date (rev)</option>
              </select>
            </div>
            <div class="setting-item">
              <label for="filterTagTable">Tag</label>
              <select id="filterTagTable">
                <option value="">All</option>
              </select>
            </div>
          </div>
          <div class="view-toggle">
            <button id="gridViewBtn" class="view-btn active">Grid</button>
            <button id="tableViewBtn" class="view-btn">Table</button>
            <button id="simpleViewBtn" class="view-btn">Simple</button>
          </div>
        </div>
      </header>
        <main>
            <div class="gallery" id="gallery">
                <p class="loading-msg">Loading...</p>
            </div>
            <div class="table-view" id="tableView" style="display: none;"></div>
            <div class="simple-view" id="simpleView" style="display: none;"></div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
