<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writer - nattsu Gallery</title>
  <link rel="stylesheet" href="writer.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="title">Writer</span>
      <span class="subtitle">items.json 編集 — 一覧でセル編集・行クリックで詳細</span>
    </header>

    <main class="main writer-layout">
      <!-- 左: データベース表示（エクセル風テーブル） -->
      <section class="data-section">
        <div class="data-section-header">
          <h2 class="data-section-title">データ一覧</h2>
          <button type="button" id="addRowBtn" class="btn btn-primary">＋ 新規追加</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="col-order"></th>
                <th class="col-id">ID</th>
                <th class="col-title">タイトル</th>
                <th class="col-type">種別</th>
                <th class="col-date">日付</th>
                <th class="col-tags">タグ</th>
                <th class="col-actions">×</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody"></tbody>
          </table>
        </div>
        <p class="hint data-hint">セルを直接編集できます。行をクリックすると右に詳細設定が表示されます。</p>
      </section>

      <!-- 右: 詳細設定（行選択時） -->
      <aside class="detail-section" id="detailSection">
        <div class="detail-panel" id="detailPanel">
          <h2 class="detail-panel-title" id="detailPanelTitle">行を選択してください</h2>
          <p class="detail-panel-hint" id="detailPanelHint">一覧で行をクリックするか「新規追加」で編集できます。</p>

          <form id="detailForm" class="detail-form" style="display: none;">
            <input type="hidden" id="detailRowIndex" value="">
            <div class="detail-common">
              <div class="field">
                <label for="id">ID *</label>
                <input type="text" id="id" required autocomplete="off">
                <span class="hint" id="idHint"></span>
              </div>
              <div class="field">
                <label for="title">タイトル</label>
                <input type="text" id="title" placeholder="表示用タイトル">
              </div>
              <div class="field">
                <label for="date">日付</label>
                <input type="date" id="date">
              </div>
              <div class="field">
                <label for="tagsInput">タグ</label>
                <p class="hint" id="tagsHint"></p>
                <div id="tagsContainer" class="tags-container"></div>
                <input type="text" id="tagsInput" class="tags-input" placeholder="タグを入力して Enter" autocomplete="off">
              </div>
            </div>

            <div class="detail-type-tabs">
              <button type="button" class="mode-btn active" data-mode="write">記事</button>
              <button type="button" class="mode-btn" data-mode="picture">画像</button>
              <button type="button" class="mode-btn" data-mode="movie">動画</button>
            </div>

            <div id="panel-write" class="panel detail-panel-content">
              <div class="field">
                <label>トップ画像（カード用）</label>
                <div class="image-drop image-drop-sm" id="writeTopImageDrop">
                  <input type="file" id="writeTopImageFile" accept="image/*" hidden>
                  <p class="drop-text">クリックまたはドラッグで選択</p>
                  <img id="writeTopImagePreview" class="top-image-preview" alt="" style="display: none;">
                </div>
              </div>
              <div class="field">
                <label for="markdown">本文（Markdown）</label>
                <div class="editor-toolbar">
                  <button type="button" class="tool-btn" data-action="paste-image" title="画像を貼り付け">画像</button>
                  <input type="file" id="fileImages" accept="image/*" multiple hidden>
                </div>
                <textarea id="markdown" rows="14" placeholder="# 見出し&#10;&#10;本文。"></textarea>
              </div>
              <div class="field">
                <label>プレビュー</label>
                <div id="preview" class="preview"></div>
              </div>
            </div>

            <div id="panel-picture" class="panel detail-panel-content" style="display: none;">
              <div class="field">
                <label>画像</label>
                <div class="image-drop" id="pictureDrop">
                  <input type="file" id="pictureFile" accept="image/*" hidden>
                  <p class="drop-text">クリックまたはドラッグで選択</p>
                  <img id="picturePreview" class="picture-preview" alt="" style="display: none;">
                </div>
              </div>
            </div>

            <div id="panel-movie" class="panel detail-panel-content" style="display: none;">
              <div class="field">
                <label>プレビュー</label>
                <div id="moviePreview" class="movie-preview"></div>
              </div>
              <div class="field">
                <label for="movieUrl">URL（YouTube など）</label>
                <input type="url" id="movieUrl" placeholder="https://www.youtube.com/watch?v=...">
              </div>
              <div class="field">
                <label>または 動画ファイル</label>
                <input type="file" id="movieFile" accept="video/*">
              </div>
            </div>

            <div class="detail-actions">
              <button type="button" id="detailSaveBtn" class="btn primary">保存</button>
              <button type="button" id="detailDeleteBtn" class="btn btn-danger">削除</button>
              <button type="button" id="draftSaveBtn" class="btn btn-secondary">仮保存</button>
              <span id="status" class="status"></span>
            </div>
          </form>
        </div>
      </aside>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="writer.js"></script>
</body>
</html>
